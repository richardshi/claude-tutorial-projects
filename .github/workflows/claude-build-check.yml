name: Claude Build Error Check

on:
  workflow_run:
    workflows: ["Claude Code", "Claude Code PR Review"]
    types: [completed]

concurrency:
  group: claude-build-check
  cancel-in-progress: true

jobs:
  claude-check:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch failed logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed \
            --repo richardshi/claude-tutorial-projects 2>&1 | head -200 \
            > failed_logs.txt || true

      - name: Run Claude Build Check
        uses: anthropics/claude-code-action@v1.0.68
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          settings: '{"allowedTools": ["Read", "Write"]}'
          prompt: |
            A GitHub Actions workflow has failed:
            - Workflow: ${{ github.event.workflow_run.name }}
            - Branch: ${{ github.event.workflow_run.head_branch }}

            The failed logs are in failed_logs.txt in the current directory.

            Steps:
            1. Read failed_logs.txt to understand the failure.
            2. Identify the root cause.
            3. Write your analysis to analysis.md. Include: what step failed,
               root cause, and concrete steps to fix it.

      - name: Post comment on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f analysis.md ]; then
            gh pr comment ${{ github.event.workflow_run.pull_requests[0].number }} \
              --repo richardshi/claude-tutorial-projects \
              --body-file analysis.md
          fi
