name: Claude Build Error Check

on:
  workflow_run:
    workflows: ["Claude Code", "Claude Code PR Review"]
    types: [completed]

concurrency:
  group: claude-build-check
  cancel-in-progress: true

jobs:
  claude-check:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Fetch failed logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run view ${{ github.event.workflow_run.id }} --log-failed \
            --repo richardshi/claude-tutorial-projects 2>&1 | head -200 \
            > failed_logs.txt
          echo "--- log size: $(wc -l < failed_logs.txt) lines ---"

      - name: Run Claude Build Check
        uses: anthropics/claude-code-action@v1.0.68
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            A GitHub Actions workflow has failed:
            - Workflow: ${{ github.event.workflow_run.name }}
            - Branch: ${{ github.event.workflow_run.head_branch }}
            - PR number: ${{ github.event.workflow_run.pull_requests[0].number }}

            The failed logs are in failed_logs.txt in the current directory.

            Steps:
            1. Read failed_logs.txt to identify the exact error and failing step.
            2. Investigate the root cause by examining the source code — do not
               just summarize the log. For example:
               - If a module is missing: use Glob to find where it should exist,
                 Grep to find where it is imported, Read the importing file
               - If a type/compile error: Read the relevant source files
               - If a config error: Read the relevant config files
            3. Post a comment on PR #${{ github.event.workflow_run.pull_requests[0].number }} using:
               gh pr comment ${{ github.event.workflow_run.pull_requests[0].number }} --repo richardshi/claude-tutorial-projects --body "..."
               The comment must include:
               - Which step failed and the exact error
               - The true root cause found in the source code (not just the log)
               - Precise steps to fix it (file names, commands, or code snippets)
