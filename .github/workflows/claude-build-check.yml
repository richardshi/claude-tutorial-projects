name: Claude Build Error Check

on:
  workflow_run:
    workflows: ["Claude Code", "Claude Code PR Review"]
    types: [completed]

concurrency:
  group: claude-build-check
  cancel-in-progress: true

jobs:
  claude-check:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Build Check
        uses: anthropics/claude-code-action@v1.0.68
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_tools: "Bash"
          prompt: |
            A GitHub Actions workflow has failed:
            - Workflow: ${{ github.event.workflow_run.name }}
            - Run ID: ${{ github.event.workflow_run.id }}
            - Branch: ${{ github.event.workflow_run.head_branch }}
            - Triggered by: ${{ github.event.workflow_run.event }}
            - PR number: ${{ github.event.workflow_run.pull_requests[0].number }}

            Steps:
            1. Run `gh run view ${{ github.event.workflow_run.id }} --log-failed --repo richardshi/claude-tutorial-projects` to get the failure logs.
            2. Identify the root cause.
            3. Post a comment on PR #${{ github.event.workflow_run.pull_requests[0].number }} using:
               `gh pr comment ${{ github.event.workflow_run.pull_requests[0].number }} --repo richardshi/claude-tutorial-projects --body "..."`
               Include: what failed, why it failed, and concrete steps to fix it.
            4. If the PR number is 0 or empty, post to a new issue comment instead.
